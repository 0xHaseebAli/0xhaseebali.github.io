<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>blog — Haseeb Ali</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <div class="nav-logo"><span>~/</span>0xHaseebAli</div>
  <div style="display:flex;align-items:center;gap:1.5rem;">
    <ul class="nav-links">
      <li><a href="index.html#home">home</a></li>
      <li><a href="index.html#about">about</a></li>
      <li><a href="projects.html">projects</a></li>
      <li><a href="blog.html" style="color:var(--green)">blog</a></li>
      <li><a href="index.html#contact">contact</a></li>
    </ul>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
      <span id="themeIcon">☀</span>
      <span id="themeLabel">light</span>
    </button>
  </div>
</nav>

<div class="page-header">
  <a href="index.html" class="back-link">← back to home</a>
  <div class="section-label">03 // blog</div>
  <h2>Writing on Medium</h2>
</div>

<div class="blog-full">
  <div class="blog-count" id="blog-count"></div>
  <div id="blog-list"></div>
</div>

<footer>
  <span>0xHaseebAli</span> &nbsp;·&nbsp; Built with GitHub Pages &nbsp;·&nbsp; Cybersecurity Portfolio
</footer>

<!-- Load data first, then the renderer -->
<script src="./javascript/blog.js"></script>
<script>
  // ── Helpers ───────────────────────────────────────────────────
  function buildSVG(lines, label) {
    // Distribute lines evenly in the SVG viewbox (y: 55 → 115)
    const startY = 55, step = lines.length > 3 ? 16 : 18;
    const linesSVG = lines.map((l, i) =>
      `<text x="110" y="${startY + i * step}" font-family="monospace" font-size="9"
        fill="var(--green)" opacity="0.4" text-anchor="middle">${l}</text>`
    ).join('\n');

    const dividerY = startY + lines.length * step + 6;

    return `
      <svg viewBox="0 0 220 160" xmlns="http://www.w3.org/2000/svg">
        <rect width="220" height="160" fill="var(--bg3)"/>
        <line x1="0" y1="0" x2="220" y2="160" stroke="var(--green)" stroke-width="0.3" opacity="0.15"/>
        <line x1="220" y1="0" x2="0" y2="160" stroke="var(--green)" stroke-width="0.3" opacity="0.15"/>
        <rect x="20" y="20" width="180" height="120" rx="2" fill="none" stroke="var(--green)" stroke-width="0.5" opacity="0.2"/>
        ${linesSVG}
        <rect x="60" y="${dividerY}" width="100" height="1" fill="var(--green)" opacity="0.15"/>
        <text x="110" y="${dividerY + 14}" font-family="monospace" font-size="8"
          fill="var(--green)" opacity="0.25" text-anchor="middle">${label}</text>
      </svg>`;
  }

  // ── Render ────────────────────────────────────────────────────
  const total = blogs.length;
  document.getElementById('blog-count').innerHTML =
    `<span>${String(total).padStart(2, '0')}</span> blog${total !== 1 ? 's' : ''} published`;

  const list = document.getElementById('blog-list');

  blogs.forEach((b, i) => {
    const num  = String(i + 1).padStart(2, '0');
    const tags = b.tags.map(t => `<span class="article-tag">${t}</span>`).join('');

    list.insertAdjacentHTML('beforeend', `
      <div class="article-card">
        <div class="article-card-top">
          <div class="article-thumb">
            ${buildSVG(b.svgLines, b.svgLabel)}
            <span class="article-thumb-label">${num}</span>
          </div>
          <div class="article-content">
            <div class="article-meta">
              <span>${b.meta.platform}</span>
              <span class="article-meta-dot"></span>
              <span>${b.meta.category}</span>
              <span class="article-meta-dot"></span>
              <span>${b.meta.readTime}</span>
            </div>
            <div class="article-title">${b.title}</div>
            <div class="article-desc">${b.desc}</div>
          </div>
        </div>
        <div class="article-card-bottom">
          <div class="article-tags">${tags}</div>
          <a href="${b.link}" target="_blank" rel="noopener" class="article-read-btn">Coming soon</a>
        </div>
      </div>
    `);
  });

  // ── Theme toggle ──────────────────────────────────────────────
  const html       = document.documentElement;
  const toggleBtn  = document.getElementById('themeToggle');
  const themeIcon  = document.getElementById('themeIcon');
  const themeLabel = document.getElementById('themeLabel');

  function applyTheme(t) {
    if (t === 'light') {
      html.classList.add('light');
      themeIcon.textContent  = '●';
      themeLabel.textContent = 'dark';
    } else {
      html.classList.remove('light');
      themeIcon.textContent  = '☀';
      themeLabel.textContent = 'light';
    }
  }

  toggleBtn.addEventListener('click', () => {
    const next = (localStorage.getItem('theme') || 'dark') === 'dark' ? 'light' : 'dark';
    localStorage.setItem('theme', next);
    applyTheme(next);
  });

  applyTheme(localStorage.getItem('theme') || 'dark');
</script>

</body>
</html>
